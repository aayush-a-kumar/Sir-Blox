name: Run Sir Blox Synchronization Pipeline

on:
  schedule:
    # Runs at 06:00 UTC everyday (Adjust CRON expression as needed)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allows you to trigger the synchronization manually from the GitHub UI

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Speeds up subsequent runs

    - name: Install Pipeline Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-auth-oauthlib google-api-python-client nbconvert

    - name: Reconstruct Authentication Tokens
      env:
        CRED_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
      run: |
        echo "$CRED_JSON" > credentials.json
        echo "$TOKEN_JSON" > token.json

    - name: Run Pipeline (Convert and Execute Notebook)
      run: |
        # Converts your notebook to a clean python script and executes it seamlessly
        jupyter nbconvert --to script sir_bloxv0.3.ipynb
        python sir_blox.py

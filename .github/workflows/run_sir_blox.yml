name: Run Sir Blox Synchronization Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4
      with:
        # Forces GitHub to unpack your files directly into the root workspace directory
        path: '.' 

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Pipeline Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Reconstruct Authentication Tokens
      env:
        CRED_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
      run: |
        echo "$CRED_JSON" > credentials.json
        echo "$TOKEN_JSON" > token.json

    - name: Run Pipeline (Convert and Execute Notebook)
      run: |
        jupyter nbconvert --to script sir_blox_v0.3.ipynb
        python sir_blox_v0.3.py